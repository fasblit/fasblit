<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jester Life Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 1100px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .stat-val { font-size: 18px; font-weight: 700; color: #f59e0b; }
        .game-layout { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 10px; text-align: left; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #f59e0b; color: #0f172a; }
        .main-content { background: #1e293b; border-radius: 16px; padding: 25px; border: 1px solid #334155; min-height: 500px; }
        .location-view { display: none; }
        .location-view.active { display: block; }
        .photo-area { width: 100%; height: 250px; background: #000; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: #f59e0b; color: #0f172a; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin: 3px; font-weight: 600; }
        .btn-danger { background: #ef4444; color: #fff; }
        .log-box { margin-top: 20px; background: #000; border: 1px solid #334155; padding: 10px; height: 120px; overflow-y: auto; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">Açlık: <div id="stat-hunger" class="stat-val">100</div></div>
        <div class="stat-card">Enerji: <div id="stat-energy" class="stat-val">100</div></div>
        <div class="stat-card">Nakit: <div id="stat-money" class="stat-val">5000</div></div>
        <div class="stat-card">Moral: <div id="stat-mood" class="stat-val">100</div></div>
    </div>

    <div class="game-layout">
        <div class="nav-menu">
            <button class="nav-btn active" onclick="go('home', this)">Evim</button>
            <button class="nav-btn" onclick="go('work', this)">İş Merkezi</button>
            <button class="nav-btn" onclick="go('market', this)">Süpermarket</button>
            <button class="nav-btn" onclick="go('gallery', this)">Araç Galerisi</button>
            <button class="nav-btn" onclick="go('tech', this)">Teknoloji</button>
            <button class="nav-btn" onclick="go('fight', this)">Dövüş Dükkanı</button>
            <button class="nav-btn" onclick="go('arena', this)">Dövüş Meydanı</button>
            <button class="nav-btn" onclick="go('casino', this)">Kumarhane</button>
            <button class="nav-btn" onclick="go('pavyon', this)">Pavyon</button>
            <button class="nav-btn" onclick="go('crypto', this)">Kripto Ofisi</button>
            <button class="nav-btn" onclick="go('airport', this)">Havaalanı</button>
            <button class="nav-btn" onclick="go('wedding', this)">Düğün Salonu</button>
        </div>

        <div class="main-content">
            <div id="loc-home" class="location-view active">
                <div class="photo-area"><img src="Ev.png"></div>
                <h3>Güvenli Ev</h3>
                <button class="btn" onclick="doAction('sleep')">Uyu ve Dinlen</button>
            </div>
            <div id="loc-work" class="location-view">
                <h3>İş Merkezi</h3>
                <button class="btn" onclick="workJob('kurye')">Kuryelik (200 🪙)</button>
                <button class="btn" onclick="workJob('yazilim')">Yazılım (600 🪙)</button>
            </div>
            <div id="loc-market" class="location-view">
                <div class="photo-area"><img src="market.png"></div>
                <button class="btn" onclick="buyItem('Sandviç', 50)">Sandviç Al</button>
            </div>
            <div id="loc-gallery" class="location-view">
                <div class="photo-area"><img src="Araç Galerisi.png"></div>
                <button class="btn" onclick="buyVehicle('Skyline', 8000)">Skyline Satın Al</button>
            </div>
            <div id="loc-tech" class="location-view">
                <div class="photo-area"><img src="teknoloji dükkanı dövüş dükkanı dövüş salonu.png"></div>
                <button class="btn" onclick="buyItem('Rig', 8000)">Kripto Rig Al</button>
            </div>
            <div id="loc-fight" class="location-view">
                <div class="photo-area"><img src="teknoloji dükkanı dövüş dükkanı dövüş salonu.png"></div>
                <button class="btn" onclick="buyWeapon('Muşta', 300)">Muşta Al</button>
            </div>
            <div id="loc-arena" class="location-view">
                <div class="photo-area"><img src="teknoloji dükkanı dövüş dükkanı dövüş salonu.png"></div>
                <button class="btn btn-danger" onclick="startFight()">Dövüşe Gir</button>
            </div>
            <div id="loc-casino" class="location-view">
                <div class="photo-area"><img src="kumarhane.png"></div>
                <input type="number" id="roulette-bet" placeholder="Bahis" class="btn">
                <button class="btn" onclick="playRoulette()">Rulet</button>
                <button class="btn btn-danger" onclick="playMines()">Mayın Tarlası</button>
            </div>
            <div id="loc-pavyon" class="location-view">
                <div class="photo-area"><img src="pavyon.png"></div>
                <button class="btn" onclick="doAction('pavyon')">Şampanya (1000 🪙)</button>
            </div>
            <div id="loc-crypto" class="location-view">
                <div class="photo-area"><img src="kripto merkezi.png"></div>
                <button class="btn" onclick="doAction('crypto')">Geliri Topla</button>
            </div>
            <div id="loc-airport" class="location-view">
                <button class="btn" onclick="doAction('fly')">Tatile Uç (2500 🪙)</button>
            </div>
            <div id="loc-wedding" class="location-view">
                <button class="btn" onclick="doAction('marry')">Düğün Yap (5000 🪙)</button>
            </div>
        </div>
    </div>
    <div class="log-box" id="log">[SİSTEM]: Şehir hayatı güncellendi!</div>
</div>

<script>
    let player = { hunger: 100, energy: 100, money: 5000, mood: 100 };
    function updateUI() {
        document.getElementById('stat-hunger').innerText = player.hunger;
        document.getElementById('stat-energy').innerText = player.energy;
        document.getElementById('stat-money').innerText = player.money;
        document.getElementById('stat-mood').innerText = player.mood;
    }
    function go(id, btn) {
        document.querySelectorAll('.location-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('loc-'+id).classList.add('active');
        btn.classList.add('active');
    }
    function workJob(job) { 
        let pay = {'kurye': 200, 'yazilim': 600};
        player.money += pay[job];
        pushLog(job + " işinden " + pay[job] + " kazandın.");
        updateUI();
    }
    function playRoulette() {
        let b = parseInt(document.getElementById('roulette-bet').value);
        if(player.money >= b) {
            player.money -= b;
            if(Math.random() > 0.5) { player.money += b*2; pushLog("Rulet kazandın!"); }
            else pushLog("Rulet kaybettin.");
        }
        updateUI();
    }
    function playMines() {
        if(player.money >= 500) {
            player.money -= 500;
            if(Math.random() > 0.4) { player.money += 2500; pushLog("Mayın tarlası kazandın!"); }
            else pushLog("Mayına bastın!");
        }
        updateUI();
    }
    function pushLog(m) { document.getElementById('log').innerHTML += "<br>" + m; }
    updateUI();
</script>
</body>
</html>
